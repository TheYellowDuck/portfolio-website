# Dependabot — automated dependency updates.
#
# Low-touch: updates run MONTHLY. Minor/patch batch into one PR and GitHub Actions into another, but
# each MAJOR gets its own PR — so one broken major (e.g. ESLint 10) can't block the others. Everything
# auto-merges the instant CI (build/tsc/lint/tests) is green — see dependabot-auto-merge.yml — so you
# never merge by hand. The only branches that linger are updates that FAIL CI: they sit red until they
# pass, then auto-merge themselves. (ESLint 10 is the current one — it crashes lint because
# eslint-config-next's plugins call context.getFilename(), removed in v10; it'll go green and merge
# once the Next preset supports v10. Leave it red; that red is the signal, not a bug.)
#
# Security PRs are separate and advisory-driven — enable "Dependabot alerts" + "Dependabot security
# updates" in GitHub → repo Settings → Code security (can't be set here). Those arrive as advisories
# are disclosed, regardless of the monthly schedule below, so the cadence never delays a real fix.
version: 2
updates:
  # App dependencies (npm). Repo root is the Next.js app, so directory is "/".
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "06:00"
      timezone: America/Toronto
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Only minor/patch are grouped (reliably green → auto-merge as one batch). Majors are left
      # ungrouped on purpose so a red one never holds back a green one.
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used by the sync/CI workflows current too (checkout, setup-node, …).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"
