# Dependabot — automated dependency updates.
#
# Tuned for low noise: updates run MONTHLY and are batched into a few grouped PRs instead of one per
# dependency. Routine minor/patch bumps land in one PR (safe to merge once CI is green); ALL major
# bumps land together in a second PR so you can review the breaking ones deliberately — never blanket
# -accept majors. GitHub Actions bumps are one PR too. Your build / tsc / lint / tests gate each PR.
#
# Security PRs are separate and advisory-driven — enable "Dependabot alerts" + "Dependabot security
# updates" in GitHub → repo Settings → Code security (can't be set here). Those arrive as advisories
# are disclosed, regardless of the monthly schedule below, so the cadence never delays a real fix.
version: 2
updates:
  # App dependencies (npm). Repo root is the Next.js app, so directory is "/".
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      time: "06:00"
      timezone: America/Toronto
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # The ESLint major is deliberately NOT ignored: Dependabot keeps an ESLint 10 PR open as a canary.
    # It stays red — lint crashes because eslint-config-next's bundled plugins call context.getFilename(),
    # removed in ESLint 10 — until the Next preset supports v10, then it flips green for you to merge.
    # Leave it red; that red is the signal, not a bug to fix.
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-major:
        applies-to: version-updates
        update-types:
          - major

  # Keep the GitHub Actions used by the sync/CI workflows current too (checkout, setup-node, …).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    commit-message:
      prefix: "chore(actions)"
    groups:
      github-actions:
        patterns:
          - "*"
