name: Dependabot auto-merge

# Fully hands-off. Enable auto-merge on EVERY Dependabot PR — minor, patch, and major. GitHub then
# merges each one the instant CI (the required `check` job) goes green. An update that FAILS CI (e.g.
# ESLint 10, which crashes lint until eslint-config-next supports v10) simply stays open + red and
# auto-merges itself the moment it turns green. So a branch only ever lingers while an update isn't
# OK yet — exactly "update when it's good, otherwise wait."
#
# Requires two one-time repo settings, or nothing auto-merges:
#   1. Settings → General → Pull Requests → "Allow auto-merge"  (ON)
#   2. A ruleset on the default branch that REQUIRES the "check" CI job (otherwise auto-merge has no
#      check to wait for and would merge immediately).
on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (GitHub merges it once CI is green)
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
