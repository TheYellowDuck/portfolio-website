name: CI

# Validates every PR (including Dependabot's) and pushes to the default branch — types, lint, tests,
# and a full `next build`. The build makes this gate self-contained: a dependency that breaks the
# build (not just types/lint/tests) is caught here, so auto-merge can't wave it through. Green = safe.
on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
