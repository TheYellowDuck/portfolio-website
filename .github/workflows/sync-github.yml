name: Sync data (GitHub projects + CP stats)

# Re-scans your repos → src/data/github.generated.ts, and fetches LeetCode + DMOJ →
# src/data/cp-stats.generated.json (from GitHub's IPs, which Cloudflare doesn't block
# the way it can Vercel's). Runs daily and on-demand. The repo scan uses the built-in GITHUB_TOKEN,
# but the commit is PUSHED with SYNC_PAT (a repo-admin PAT) so it clears the "Require CI on main"
# ruleset, which blocks github-actions[bot]'s direct pushes. Without that secret the data never lands.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: write # allow committing the regenerated data file

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Push the daily data commit with a PAT (the repo admin) so it bypasses the "Require CI on
          # main" ruleset — admins are exempt, github-actions[bot] is not. Until SYNC_PAT is set this
          # falls back to GITHUB_TOKEN (whose push the ruleset still blocks), so adding that one secret
          # is all that's needed to switch this on.
          token: ${{ secrets.SYNC_PAT || github.token }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # The sync downscales demo videos and renders poster frames — both need ffmpeg, which the
      # GitHub-hosted runner doesn't include by default.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Sync from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}            # repo scan + rendered-README GIF resolve (public read)
        run: node scripts/sync-github.mjs

      - name: Sync CP stats (LeetCode + DMOJ)
        run: node scripts/sync-cp-stats.mjs

      # sync:docs needs pdf-parse, so install deps first (the other sync scripts are dependency-free).
      - name: Install dependencies
        run: npm ci

      - name: Sync docs (résumé + transcript PDFs → JSON)
        run: npm run sync:docs

      - name: Commit if anything changed
        run: |
          git add src/data/github.generated.ts src/data/cp-stats.generated.json src/data/resume.generated.json src/data/transcript.generated.json public/videos
          if git diff --cached --quiet; then
            echo "No changes to project data or videos."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            # No "[skip ci]" — that string makes Vercel skip the deploy, so the refreshed data would
            # never reach the live site. This workflow only runs on schedule/dispatch (not on push),
            # and GITHUB_TOKEN pushes don't trigger workflows, so there's no self-trigger loop.
            git commit -m "chore: sync GitHub projects"
            git push
          fi
