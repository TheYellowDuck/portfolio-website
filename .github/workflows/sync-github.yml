name: Sync GitHub projects

# Re-scans your repos and regenerates src/data/github.generated.ts. Runs daily and
# on-demand. Uses the built-in GITHUB_TOKEN (public-repo read) — no secret to set up.
on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: # manual "Run workflow" button

permissions:
  contents: write # allow committing the regenerated data file

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync from GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-github.mjs

      - name: Commit if anything changed
        run: |
          git add src/data/github.generated.ts public/videos
          if git diff --cached --quiet; then
            echo "No changes to project data or videos."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: sync GitHub projects [skip ci]"
            git push
          fi
